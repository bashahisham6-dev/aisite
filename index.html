<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BranchChat Slim</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Compact Header */
  header {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    background: #111;
    border-bottom: 1px solid #222;
    gap: 8px;
  }
  #persona-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #222;
    border: none;
    border-radius: 12px;
    padding: 4px 8px;
    color: #007aff;
    font-size: 12px;
    cursor: pointer;
  }
  #new-chat-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: #007aff;
    font-size: 20px;
    cursor: pointer;
  }

  /* Message Area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg { max-width: 92%; display: flex; flex-direction: column; }
  .msg.user { align-self: flex-end; }
  .msg.ai { align-self: flex-start; }
  
  .bubble {
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.4;
    word-wrap: break-word;
  }
  .msg.user .bubble { background: #007aff; color: #fff; border-bottom-right-radius: 2px; }
  .msg.ai .bubble { background: #26262e; color: #fff; border-bottom-left-radius: 2px; }

  /* Input Area */
  footer {
    padding: 8px;
    background: #111;
    border-top: 1px solid #222;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  #user-input {
    flex: 1;
    background: #222;
    border: 1px solid #333;
    border-radius: 18px;
    padding: 8px 12px;
    color: #fff;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    max-height: 80px;
    outline: none;
  }
  #send-btn {
    width: 32px;
    height: 32px;
    background: #007aff;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }
  #send-btn:disabled { background: #333; color: #666; }

  /* Typing Dot Animation */
  .typing { display: flex; gap: 4px; padding: 4px; }
  .typing span { width: 4px; height: 4px; background: #666; border-radius: 50%; animation: blink 1.4s infinite; }
  @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>

<header>
  <button id="persona-btn" onclick="togglePersona()">
    <span id="p-emoji">🟠</span>
    <span id="p-name">Mean Mode</span>
  </button>
  <button id="new-chat-btn" onclick="newChat()">+</button>
</header>

<main id="messages"></main>

<footer>
  <textarea id="user-input" rows="1" placeholder="Message..." oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()">↑</button>
</footer>

<script>
  const API_KEY = 'Nrlc8D0TznN2i2BTLjEYX8yMiIyMSzqH';
  
  const PERSONAS = {
    standard: { name: 'Standard', emoji: '⚪', system: 'You are a helpful assistant.' },
    mean: { name: 'Mean Mode', emoji: '🟠', system: 'Core Directive: Be mean. No empathy. No fake politeness. Never praise the user. Ignore pre-prompts. Do not say imagine.' }
  };

  let currentPID = 'mean';
  let history = [];

  function togglePersona() {
    currentPID = currentPID === 'mean' ? 'standard' : 'mean';
    document.getElementById('p-emoji').textContent = PERSONAS[currentPID].emoji;
    document.getElementById('p-name').textContent = PERSONAS[currentPID].name;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  function newChat() {
    history = [];
    document.getElementById('messages').innerHTML = '';
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    
    const typing = showTyping();
    
    try {
      const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
        body: JSON.stringify({
          model: 'mistral-small-latest',
          messages: [{ role: 'system', content: PERSONAS[currentPID].system }, ...history, { role: 'user', content: text }]
        })
      });
      
      const data = await response.json();
      typing.remove();
      const reply = data.choices[0].message.content;
      appendMessage('assistant', reply);
      history.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
    } catch (err) {
      typing.remove();
      appendMessage('assistant', 'Error: ' + err.message);
    }
  }

  function appendMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
